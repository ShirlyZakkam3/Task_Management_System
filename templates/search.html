<!DOCTYPE html>
<html lang="en">
<head>
  <title>Search Profiles</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/styles.css?v=2" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top px-4">
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="/">My Time Line</a></li>
        <li class="nav-item"><a class="nav-link" href="/profile">My Profile</a></li>
        <li class="nav-item"><a class="nav-link" href="/create_post">Create Post</a></li>
        <li class="nav-item"><a class="nav-link" href="/search">Search</a></li>
        <li class="nav-item"><a class="nav-link" href="/login">Logout</a></li>
      </ul>
    </div>
  </nav>
  

<div class="centered-page">
  <div class="card text-center p-4 mt-5">
    <h2 class="mb-3">Search Users</h2>

    <div class="d-flex">
      <input id="search-query" class="form-control me-2" placeholder="Enter profile name..." required>
      <button id="search-btn" class="btn btn-magenta">Search</button>
    </div>

    <div id="results" class="mt-4"></div>
  </div>
</div>

<script>
  document.getElementById('search-btn').addEventListener('click', async () => {
    const query = document.getElementById('search-query').value.trim();
    if (!query) return;
  
    const res = await fetch(`/search_user?query=${encodeURIComponent(query)}`);
    const users = await res.json();
  
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = "";
  
    if (users.length === 0) {
      resultsDiv.innerHTML = "<p class='text-white mt-3'>No users found</p>";
    } else {
      users.forEach(user => {
        const userLink = document.createElement('a');
        userLink.href = `/profile/${user.email}`; 
        userLink.textContent = user.profile_name;
        userLink.classList.add('d-block', 'text-white', 'text-decoration-none', 'my-2', 'fw-bold');
        resultsDiv.appendChild(userLink);
      });
    }
  });
  </script>  

<script type="module" src="/static/firebase-login.js"></script>
</body>
</html>
