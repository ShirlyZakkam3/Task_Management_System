<!DOCTYPE html>
<html lang="en">
<head>
  <title>Following</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/styles.css?v=4" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top px-4">
  <div class="collapse navbar-collapse justify-content-end">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="/profile">My Profile</a></li>
      <li class="nav-item"><a class="nav-link" href="/create_post">Create Post</a></li>
      <li class="nav-item"><a class="nav-link" href="/search">Search</a></li>
      <li class="nav-item"><a class="nav-link" href="/login">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="container text-center mt-5 pt-5">
  <h2 class="text-white mb-4">Following</h2>
  {% if following %}
    <div class="list-group">
      {% for user in following %}
        <div class="list-group-item list-group-item-action bg-transparent text-white fw-bold">
          {{ user.name }}
        </div>
      {% endfor %}
    </div>
  {% else %}
    <p class="text-white mt-3">You are not following anyone yet.</p>
  {% endif %}
</div>

<script type="module" src="/static/firebase-login.js"></script>
</body>
</html>
